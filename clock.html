<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="clock-styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1>⏰ Digital Clock</h1>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="clock.html" class="active">Clock</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="clock-section">
            <div class="container">
                <h2>Current Time in Different Time Zones</h2>
                
                <div class="controls">
                    <label for="timezone-select">Add Time Zone:</label>
                    <select id="timezone-select">
                        <option value="">Select a time zone...</option>
                        <option value="UTC">UTC (Coordinated Universal Time)</option>
                        <option value="America/New_York">Eastern Time (ET)</option>
                        <option value="America/Chicago">Central Time (CT)</option>
                        <option value="America/Denver">Mountain Time (MT)</option>
                        <option value="America/Los_Angeles">Pacific Time (PT)</option>
                        <option value="Europe/London">London (GMT)</option>
                        <option value="Europe/Paris">Paris (CET)</option>
                        <option value="Europe/Tokyo">Tokyo (JST)</option>
                        <option value="Asia/Shanghai">Shanghai (CST)</option>
                        <option value="Asia/Hong_Kong">Hong Kong (HKT)</option>
                        <option value="Asia/Dubai">Dubai (GST)</option>
                        <option value="Australia/Sydney">Sydney (AEDT)</option>
                        <option value="Pacific/Auckland">Auckland (NZDT)</option>
                        <option value="Asia/Kolkata">India (IST)</option>
                        <option value="Asia/Bangkok">Bangkok (ICT)</option>
                    </select>
                    <button onclick="addTimezone()">Add</button>
                </div>

                <div class="clocks-grid" id="clocksGrid">
                </div>

                <button class="reset-btn" onclick="resetClocks()">Reset to Default</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Digital Clock. All rights reserved.</p>
    </footer>

    <script src="clock-script.js"></script>
</body>
</html>
